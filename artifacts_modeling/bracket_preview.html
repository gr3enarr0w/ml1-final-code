<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>NCAA Bracket Projections</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #111; padding: 18px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .panel { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    h1 { margin: 0 0 12px 0; }
    img { width: 100%; height: auto; border: 1px solid #bbb; }
  </style>
</head>
<body>
  <h1>NCAA Tournament Projection Outputs (Latest Data)</h1>
  <div class="grid">
    <div class="panel">
      <h2>Men's (MBB) Bracket</h2>
      <img src="ncaa_bracket_projection_mbb_latest.png" alt="MBB bracket" />
    </div>
    <div class="panel">
      <h2>Women's (WBB) Bracket</h2>
      <img src="ncaa_bracket_projection_wbb_latest.png" alt="WBB bracket" />
    </div>
  </div>
  <div class="panel" style="margin-top:20px">
    <h2>Combined Side-by-Side</h2>
    <img src="ncaa_bracket_projection_mbb_wbb_latest.png" alt="Combined bracket" />
  </div>
</body>
</html>
