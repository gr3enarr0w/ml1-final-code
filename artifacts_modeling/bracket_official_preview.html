<!doctype html>
<html>
<head><meta charset="utf-8"><title>Official-Style NCAA Bracket</title>
<style>
 body { font-family: Arial, sans-serif; background: #eef2fb; color: #111; padding: 16px; }
 .card { background:#fff; border:1px solid #d6dff0; border-radius:10px; padding:10px; margin:12px 0; box-shadow:0 4px 12px rgba(0,0,0,.08);}
 h1 { margin: 0 0 10px 0; }
 img { width: 100%; max-width: 100%; height: auto; border: 1px solid #c5d0e8; }
 .grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
</style>
</head>
<body>
  <h1>NCAA Official-Style Bracket View</h1>
  <div class="grid">
    <div class="card"><h2>Men's</h2><img src="ncaa_bracket_official_mbb.png" alt="MBB bracket"></div>
    <div class="card"><h2>Women's</h2><img src="ncaa_bracket_official_wbb.png" alt="WBB bracket"></div>
  </div>
  <div class="card"><h2>Combined</h2><img src="ncaa_bracket_official_combo.png" alt="Combined bracket"></div>
</body>
</html>
